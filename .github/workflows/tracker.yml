name: Price Tracker

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  check-price:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Build and Install Playwright
      shell: pwsh
      run: |
        # Search for the core project file anywhere in the repo
        $projFile = Get-ChildItem -Filter "PricePulse.Core.csproj" -Recurse | Select-Object -First 1
        if (-not $projFile) { throw "Could not find PricePulse.Core.csproj" }
        
        Write-Host "Building project at: $($projFile.FullName)"
        dotnet build $($projFile.FullName) -c Release
        
        # Find the playwright script generated by the build
        $pwScript = Get-ChildItem -Filter "playwright.ps1" -Recurse | Select-Object -First 1
        if (-not $pwScript) { throw "Could not find playwright.ps1" }
        
        Write-Host "Installing Playwright using: $($pwScript.FullName)"
        pwsh $($pwScript.FullName) install --with-deps

    - name: Run Scraper
      shell: pwsh
      run: |
        $projFile = Get-ChildItem -Filter "PricePulse.Core.csproj" -Recurse | Select-Object -First 1
        dotnet run --project $($projFile.FullName) -c Release --no-build

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add **/price_history.json || git add price_history.json
        git commit -m "Update price history [skip ci]" || echo "No changes to commit"
        git push