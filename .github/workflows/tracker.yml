name: iPhone Price Tracker

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  check-price:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        # Disable automatic restore to prevent searching for non-existent .sln paths
        cache: false 

    - name: Build and Install Playwright
      shell: pwsh
      run: |
        # Remove solution files to avoid conflicts with outdated project paths
        Get-ChildItem -Filter *.sln -Recurse | Remove-Item -Force
        
        # Find the project file dynamically
        $proj = Get-ChildItem -Filter *.csproj -Recurse | Select-Object -First 1
        Write-Host "Found project: $($proj.FullName)"
        
        # Restore and build targeting the project file directly
        dotnet restore $($proj.FullName)
        dotnet build $($proj.FullName) --no-restore
        
        # Find and run Playwright installation script
        $pwScript = Get-ChildItem -Filter playwright.ps1 -Recurse | Select-Object -First 1
        pwsh $($pwScript.FullName) install --with-deps

    - name: Run Scraper
      shell: pwsh
      run: |
        # Locate project and run without re-building
        $proj = Get-ChildItem -Filter *.csproj -Recurse | Select-Object -First 1
        dotnet run --project $($proj.FullName) --no-build

    - name: Commit and Push changes
      run: |
        # Setup git bot identity
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Save changes in price_history.json back to the repository
        git add price_history.json
        git commit -m "Update price history" || exit 0
        git push