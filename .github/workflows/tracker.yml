name: iPhone Price Tracker

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  check-price:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Clean and Build
      shell: pwsh
      run: |
        # Видаляємо файл рішення, щоб він не заважав неправильними шляхами
        Get-ChildItem -Filter *.sln -Recurse | Remove-Item -Force
        
        # Знаходимо проект і будуємо його
        $proj = Get-ChildItem -Filter *.csproj -Recurse | Select-Object -First 1
        Write-Host "Building project: $($proj.FullName)"
        dotnet build $($proj.FullName)
        
        # Встановлюємо Playwright
        $pwScript = Get-ChildItem -Filter playwright.ps1 -Recurse | Select-Object -First 1
        pwsh $($pwScript.FullName) install --with-deps

    - name: Run Scraper
      shell: pwsh
      run: |
        $proj = Get-ChildItem -Filter *.csproj -Recurse | Select-Object -First 1
        dotnet run --project $($proj.FullName)

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add price_history.json
        git commit -m "Update price history" || exit 0
        git push