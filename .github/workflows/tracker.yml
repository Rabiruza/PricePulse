name: Price Tracker

on:
  schedule:
    # Run every 6 hours to check for price updates
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Allow manual triggering of the workflow from the GitHub UI

jobs:
  check-price:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      # Downloads the repository content to the runner

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        # Ensures the environment has the correct .NET SDK version

    - name: Run Unit Tests
      shell: pwsh
      run: |
        # Ensure business logic is correct before running the scraper
        dotnet test --configuration Release
        # If any test fails, the workflow stops here to prevent errors

    - name: Build and Install Playwright
      shell: pwsh
      run: |
        # Find the Core project file dynamically within the repository
        $projFile = Get-ChildItem -Filter "PricePulse.Core.csproj" -Recurse | Select-Object -First 1
        if (-not $projFile) { throw "Could not find PricePulse.Core.csproj" }
        
        Write-Host "Building project at: $($projFile.FullName)"
        dotnet build $($projFile.FullName) -c Release
        
        # Locate the Playwright installation script generated during build
        $pwScript = Get-ChildItem -Filter "playwright.ps1" -Recurse | Select-Object -First 1
        if (-not $pwScript) { throw "Could not find playwright.ps1" }
        
        Write-Host "Installing Playwright browsers and dependencies..."
        pwsh $($pwScript.FullName) install --with-deps

    - name: Run Scraper
      shell: pwsh
      env: 
        # Inject secrets for Telegram notifications
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        # Execute the application to fetch the price and notify if changed
        $projFile = Get-ChildItem -Filter "PricePulse.Core.csproj" -Recurse | Select-Object -First 1
        dotnet run --project $($projFile.FullName) -c Release --no-build

    - name: Commit and Push changes
      run: |
        # Configure Git to use GitHub Actions bot identity
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Add the updated price history file to the commit
        git add **/price_history.json || git add price_history.json
        
        # Commit only if there are changes, otherwise skip without error
        git commit -m "Update price history [skip ci]" || echo "No changes to commit"
        
        # Push the updated history back to the repository
        git push