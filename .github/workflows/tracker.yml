name: iPhone Price Tracker

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  check-price:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Install Playwright Browsers
      run: |
        dotnet build
        $PW_PATH = Get-ChildItem -Path . -Filter playwright.ps1 -Recurse | Select-Object -First 1 -ExpandProperty FullName
        pwsh $PW_PATH install --with-deps

    - name: Run Scraper
      run: |
        $PROJ_PATH = Get-ChildItem -Path . -Filter *.csproj -Recurse | Select-Object -First 1 -ExpandProperty FullName
        dotnet run --project $PROJ_PATH

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add price_history.json
        git commit -m "Update price history" || exit 0
        git push