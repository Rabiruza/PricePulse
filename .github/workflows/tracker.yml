name: iPhone Price Tracker

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  check-price:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        cache: false

    - name: Build and Install Playwright
      shell: pwsh
      run: |
        # Ensure we are in the project directory where .csproj actually is
        cd PricePulse.Core
        
        # Build the project directly
        dotnet build PricePulse.Core.csproj -c Release
        
        # Install Playwright browsers using the generated script
        $pwScript = Get-ChildItem -Path .. -Filter playwright.ps1 -Recurse | Select-Object -First 1
        pwsh $($pwScript.FullName) install --with-deps

    - name: Run Scraper
      shell: pwsh
      run: |
        cd PricePulse.Core
        dotnet run --project PricePulse.Core.csproj -c Release --no-build

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add PricePulse.Core/price_history.json
        git commit -m "Update price history [skip ci]" || exit 0
        git push